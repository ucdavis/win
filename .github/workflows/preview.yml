name: Quarto Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - 'chapters/**'
      - '_quarto.yml'
      - '.github/workflows/preview.yml'
      - '.github/workflows/publish.yml'
      - '*.qmd'
      - '*.css'

concurrency: preview-${{ github.ref }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render
        if: github.event.action != 'closed' # skip the build if the PR has been closed
        uses: quarto-dev/quarto-actions/render@v2

      - name: list files
        shell: bash
        run: |
          echo "contents of _book:"
          ls _book/ || echo "_book directory not found"
          echo "contents of .:"
          ls .
      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@main
        with:
          source-dir: _book/
          pages-base-url: scaling-robot-wry3qok.pages.github.io/win
