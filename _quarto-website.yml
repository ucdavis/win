  site-url: https://ucdavis.github.io/win/
  description: "Lecture notes based on 'What If?' by Hernán MA, Robins JM"
  page-footer:
    center: "Based on [What If?](https://miguelhernan.org/whatifbook) by Hernán MA, Robins JM"
  back-to-top-navigation: true
  page-navigation: true
  reader-mode: true
  repo-url: https://github.com/ucdavis/win
  repo-actions: [edit, issue, source]
  navbar:
    right:
      - icon: github
        href: https://github.com/ucdavis/win
        aria-label: GitHub
    left:
      - text: "Home"
        href: index.qmd
      - text: "Chapters"
        menu:
          - text: "Chapter 1: Introduction"
            href: chapters/01-introduction.qmd
          - text: "Chapter 2: Randomized Experiments"
            href: chapters/02-randomized-experiments.qmd
          - text: "Chapter 3: Observational Studies"
            href: chapters/03-observational-studies.qmd
          - text: "Chapter 4: Effect Modification"
            href: chapters/04-effect-modification.qmd
          - text: "Chapter 5: Interaction"
            href: chapters/05-interaction.qmd
          - text: "Chapter 6: Graphical Representation"
            href: chapters/06-graphical-representation.qmd
          - text: "Chapter 7: Confounding"
            href: chapters/07-confounding.qmd
          - text: "Chapter 8: Selection Bias"
            href: chapters/08-selection-bias.qmd
          - text: "Chapter 9: Measurement Bias"
            href: chapters/09-measurement-bias.qmd
          - text: "Chapter 10: Random Variability"
            href: chapters/10-random-variability.qmd
          - text: "Chapter 11: Why Model?"
            href: chapters/11-why-model.qmd
          - text: "Chapter 12: IP Weighting and Marginal Structural Models"
            href: chapters/12-ip-weighting-marginal-structural-models.qmd
          - text: "Chapter 13: Standardization and the Parametric G-Formula"
            href: chapters/13-standardization-parametric-g-formula.qmd
          - text: "Chapter 14: G-Estimation of Structural Nested Models"
            href: chapters/14-g-estimation-structural-nested-models.qmd
          - text: "Chapter 15: Outcome Regression and Propensity Scores"
            href: chapters/15-outcome-regression-propensity-scores.qmd
          - text: "Chapter 16: Instrumental Variable Estimation"
            href: chapters/16-instrumental-variable-estimation.qmd
          - text: "Chapter 17: Causal Survival Analysis"
            href: chapters/17-causal-survival-analysis.qmd
          - text: "Chapter 18: Variable Selection for Causal Inference"
            href: chapters/18-variable-selection-causal-inference.qmd
          - text: "Chapter 19: Time-Varying Treatments"
            href: chapters/19-time-varying-treatments.qmd
          - text: "Chapter 20: Treatment-Confounder Feedback"
            href: chapters/20-treatment-confounder-feedback.qmd
