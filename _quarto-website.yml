callouty-theorem:
  thm:
    override-title: false
    callout:
      type: lem  # same color as lem (royal blue)
      appearance: minimal
  lem:
    override-title: false
    callout:
      type: lem
      appearance: minimal
  cor:
    override-title: false
    callout:
      type: cor
      appearance: minimal
  prp:
    override-title: false
    callout:
      type: prp
      appearance: minimal
  cnj:
    override-title: false
    callout:
      type: cnj
      appearance: minimal
  def:
    override-title: false
    callout:
      type: def
      appearance: minimal
  exm:
    override-title: false
    callout:
      type: exm
      appearance: minimal
  exr:
    override-title: false
    callout:
      type: exr
      appearance: minimal
  proof:
    override-title: true
    callout:
      type: proof
      appearance: default
      collapse: true
      icon: true
  solution:
    override-title: true
    callout:
      type: solution
      appearance: default
      collapse: true
      icon: false
  remark:
    override-title: true
    callout:
      type: remark
      appearance: default
      collapse: false
      icon: true

custom-callout:
  lem:
    color: "#1565C0"  # royal blue (also used for thm)
  cor:
    color: "#00838F"  # dark cyan
  prp:
    color: "#827717"  # dark olive
  cnj:
    color: "#558B2F"  # grass green
  def:
    color: "#1B5E20"  # forest green
  exm:
    color: "#6A1B9A"  # deep purple
  exr:
    color: "#FFA500"  # orange
  proof:
    color: "#37474F"  # blue-grey slate
  solution:
    color: "#4E342E"  # dark cocoa
  remark:
    color: "#AD1457"  # dark magenta

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-location: right
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-link: true
    highlight-style: pygments
    lightbox: true
    link-external-icon: true
    embed-resources: false
    fig-cap-location: top
    html-math-method: mathjax
    number-sections: true
    number-depth: 3
    df-print: paged
    date: last-modified
    date-format: "[Last modified:] YYYY-MM-DD HH:mm:ss (z)"
    filters:
      - _extensions/preview-highlight.lua
      - sun123zxy/callouty-theorem
      - coatless-quarto/custom-callout
  revealjs:
    theme: simple
    slide-number: true
    chalkboard: true
    preview-links: auto
    controls: true
    transition: slide
    background-transition: fade
    lightbox: true
    fig-cap-location: top
    html-math-method: mathjax
    smaller: true
    number-sections: true
    progress: true
    incremental: false
    df-print: paged
    number-depth: 2
    shift-heading-level-by: -1
    slide-level: 2
    scrollable: true
    echo: true
    margin: 0.0
    code-fold: true
    code-link: true
    code-summary: "[R code]"
    auto-stretch: true
    fig-height: 5
    fig-width: 7
  pdf:
    geometry:
      - top=15mm
      - bottom=20mm
    keep-md: false
    keep-tex: false
    toc: true
    fig-pos: "H"
    toc-title: Contents
    df-print: tibble
    links-as-notes: true
    documentclass: article
    colorlinks: true
    number-sections: true
    number-depth: 3
    filters:
      - sun123zxy/callouty-theorem
      - coatless-quarto/custom-callout
  docx:
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    df-print: tibble
    prefer-html: true
    filters:
      - sun123zxy/callouty-theorem
      - coatless-quarto/custom-callout

execute:
  warning: false
  message: false
  cache: false
  freeze: auto

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"
